<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)" rx="12"/>
  <circle cx="180" cy="120" r="190" fill="#ffffff08"/>
  <circle cx="1020" cy="480" r="170" fill="#ffffff10"/>
  <circle cx="600" cy="300" r="60" fill="#ffffff20" filter="url(#shadow)"/>
  <!-- Calendar icon -->
  <g transform="translate(564, 252)" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="12" width="64" height="60" rx="6" fill="#ffffffCC"/>
    <line x1="4" y1="32" x2="68" y2="32"/>
    <line x1="20" y1="4" x2="20" y2="20"/>
    <line x1="52" y1="4" x2="52" y2="20"/>
    <circle cx="24" cy="48" r="4" fill="#8B5CF6"/>
    <circle cx="36" cy="48" r="4" fill="#8B5CF6"/>
    <circle cx="48" cy="48" r="4" fill="#8B5CF6"/>
    <circle cx="24" cy="60" r="4" fill="#8B5CF680"/>
  </g>
</svg>