<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE8D0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9BFA0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F28C6F;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)" rx="12"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="100" r="180" fill="#ffffff10"/>
  <circle cx="1000" cy="500" r="220" fill="#ffffff08"/>
  <circle cx="600" cy="300" r="60" fill="#ffffff20" filter="url(#shadow)"/>
  <!-- Rocket icon -->
  <g transform="translate(560, 240)" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 40 C40 40 60 0 40-30 C20 0 40 40 40 40Z" fill="#ffffffCC"/>
    <path d="M30 30 L20 50 L40 42 L60 50 L50 30"/>
    <circle cx="40" cy="8" r="5" fill="#F28C6F"/>
    <path d="M20 10 C10 15 5 25 10 30" stroke="#ffffffAA"/>
    <path d="M60 10 C70 15 75 25 70 30" stroke="#ffffffAA"/>
    <line x1="35" y1="52" x2="32" y2="65" stroke="#ffffffBB"/>
    <line x1="40" y1="52" x2="40" y2="70" stroke="#ffffffBB"/>
    <line x1="45" y1="52" x2="48" y2="65" stroke="#ffffffBB"/>
  </g>
</svg>